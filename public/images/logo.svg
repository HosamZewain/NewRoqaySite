<?xml version="1.0" encoding="UTF-8"?>
<!--
  RoQay logo — clean SVG approximation.
  Replace with the brand PNG by saving the original as /public/images/logo.png
  (markup prefers the PNG and falls back to this SVG automatically).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 220" width="260" height="220" role="img" aria-label="RoQay">
  <defs>
    <linearGradient id="roqayCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2aa3e8"/>
      <stop offset="100%" stop-color="#1488d8"/>
    </linearGradient>
  </defs>

  <!-- Two dots (umlaut, echoing the Arabic diacritic on "رَقي") -->
  <circle cx="100" cy="18"  r="7" fill="#1a2a52"/>
  <circle cx="138" cy="18"  r="7" fill="#1a2a52"/>

  <!-- Q (cyan, large outer ring) -->
  <circle cx="160" cy="100" r="62" fill="none" stroke="url(#roqayCyan)" stroke-width="22"/>
  <!-- Q's tail -->
  <rect x="195" y="135" width="36" height="14" rx="7"
        transform="rotate(45 213 142)" fill="url(#roqayCyan)"/>

  <!-- R (navy, layered over Q) -->
  <g fill="#1a2a52">
    <!-- vertical stem -->
    <rect x="50" y="55" width="22" height="100" rx="4"/>
    <!-- top loop outer -->
    <path d="M72 55 H110 a32 32 0 0 1 0 64 H72 V99 H106 a12 12 0 0 0 0-24 H72 Z"/>
    <!-- diagonal leg -->
    <path d="M88 110 L130 158 H102 L72 122 Z"/>
  </g>

  <!-- ROQAY wordmark -->
  <text x="130" y="200" text-anchor="middle"
        font-family="'Tajawal','Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="36" letter-spacing="4" fill="#1a2a52">ROQAY</text>
</svg>
